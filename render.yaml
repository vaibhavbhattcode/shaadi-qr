services:
  - type: web
    name: shaadishots
    env: docker
    disk:
      name: shaadishots-data
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TRUST_PROXY
        value: true
      - key: DATABASE_PATH
        value: /data/app.db
      - key: STORAGE_DIR
        value: /data/storage
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: STORAGE_PROVIDER
        value: r2
      - key: S3_ENDPOINT
      - key: S3_BUCKET_NAME
      - key: S3_ACCESS_KEY_ID
      - key: S3_SECRET_ACCESS_KEY
      - key: S3_REGION
        value: auto
      - key: RAZORPAY_KEY_ID
      - key: RAZORPAY_KEY_SECRET
