name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Run tests
        run: npm test || echo "No tests configured yet"
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-minimum-32-characters-for-ci
          COOKIE_SECRET: test-cookie-secret-minimum-32-characters-for-ci
          DATABASE_PATH: ./data/test.db
          STORAGE_DIR: ./storage
          STORAGE_PROVIDER: local

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t shaadishots:${{ github.sha }} .

      - name: Verify image starts
        run: |
          docker run -d --name test \
            -e NODE_ENV=production \
            -e JWT_SECRET=ci-test-jwt-secret-32-chars-min-here \
            -e COOKIE_SECRET=ci-test-cookie-secret-32-chars-min \
            -e DATABASE_PATH=./data/ci-test.db \
            -e STORAGE_DIR=./storage \
            -e STORAGE_PROVIDER=local \
            -p 3000:3000 \
            shaadishots:${{ github.sha }}
          
          # Wait for startup
          sleep 5
          
          # Health check
          curl -f http://localhost:3000/health || (docker logs test && exit 1)
          
          # Cleanup
          docker stop test && docker rm test
